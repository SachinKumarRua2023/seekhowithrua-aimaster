<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Professor | SeekhoWithRua</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: rgba(20, 20, 30, 0.9);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a3a;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .chat-container {
      flex: 1;
      background: #14141f;
      border-radius: 16px;
      padding: 20px;
      overflow-y: auto;
      margin-bottom: 20px;
      border: 1px solid #2a2a3a;
    }
    .message {
      margin-bottom: 16px;
      max-width: 80%;
    }
    .message.user {
      margin-left: auto;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
    }
    .message.ai {
      background: #2a2a3a;
      padding: 12px 16px;
      border-radius: 16px 16px 16px 4px;
    }
    .input-area {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      padding: 14px 20px;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
    }
    button {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .typing {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">SEEKHOWITHRUA</div>
    <span class="badge">Gemma 4 AI</span>
  </header>
  
  <div class="container">
    <div class="chat-container" id="chat">
      <div class="message ai">
        <strong>AI Professor</strong><br>
        Hello! I'm your AI Professor powered by Gemma 4. Ask me anything about programming, data science, or any topic you want to learn!
      </div>
    </div>
    
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Ask anything you want to learn..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="https://app.seekhowithrua.com/js/cosmos-auth.js"></script>
  <script>
    const API_URL = '/api/chat';
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const btn = document.getElementById('sendBtn');
      const chat = document.getElementById('chat');
      const message = input.value.trim();
      
      if (!message || btn.disabled) return;
      
      // Add user message
      chat.innerHTML += `<div class="message user">${escapeHtml(message)}</div>`;
      input.value = '';
      btn.disabled = true;
      
      // Add typing indicator
      const typingId = 'typing-' + Date.now();
      chat.innerHTML += `<div class="message ai typing" id="${typingId}">Thinking...</div>`;
      chat.scrollTop = chat.scrollHeight;
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, subject: 'general' })
        });
        
        // Remove typing indicator
        document.getElementById(typingId)?.remove();
        
        if (!response.ok) {
          const error = await response.json().catch(() => ({ error: 'Server error' }));
          throw new Error(error.error || `HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data.success) {
          chat.innerHTML += `<div class="message ai"><strong>AI Professor</strong><br>${escapeHtml(data.response)}</div>`;
        } else {
          throw new Error(data.error || 'Failed to get response');
        }
      } catch (err) {
        document.getElementById(typingId)?.remove();
        chat.innerHTML += `<div class="message ai" style="color: #ff6b6b;"><strong>Error:</strong> ${escapeHtml(err.message)}</div>`;
      }
      
      btn.disabled = false;
      chat.scrollTop = chat.scrollHeight;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>

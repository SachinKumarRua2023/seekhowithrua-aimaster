<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzes | SeekhoWithRua</title>
  <meta name="description" content="Test your knowledge with quizzes for all courses. Python, Data Science, Web Development, AI/ML, Cloud, and more.">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="../js/cosmos-auth.js"></script>
  <script src="js/auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2a 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .particle {
      position: absolute; width: 4px; height: 4px;
      background: rgba(124, 58, 237, 0.3); border-radius: 50%;
      animation: float 20s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; } 90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    header {
      position: relative; z-index: 10; padding: 20px 40px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      background: rgba(10, 10, 26, 0.8); backdrop-filter: blur(10px);
    }
    .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #00d4ff); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text; }
    nav { display: flex; align-items: center; gap: 20px; }
    nav a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 25px;
      font-size: 14px; font-weight: 500; transition: color 0.3s; }
    nav a:hover { color: #7c3aed; }
    .user-section { display: flex; align-items: center; gap: 15px; }
    
    main { position: relative; z-index: 5; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 36px; text-align: center;
      margin-bottom: 15px; background: linear-gradient(135deg, #7c3aed, #00d4ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    
    /* Filter tabs */
    .filter-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
    .filter-tab { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
      color: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 25px;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
    .filter-tab:hover, .filter-tab.active { background: #7c3aed; color: #fff; }
    
    /* Quiz Grid */
    .quiz-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
    .quiz-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(124,58,237,0.2);
      border-radius: 16px; padding: 25px; transition: all 0.3s; cursor: pointer;
      text-decoration: none; color: inherit; display: block; }
    .quiz-card:hover { transform: translateY(-5px); border-color: #7c3aed;
      box-shadow: 0 15px 40px rgba(124,58,237,0.2); }
    .quiz-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .quiz-icon { width: 50px; height: 50px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 24px; }
    .quiz-meta { flex: 1; }
    .quiz-category { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: #7c3aed; font-weight: 600; margin-bottom: 5px; }
    .quiz-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
    .quiz-info { display: flex; gap: 15px; font-size: 13px; color: rgba(255,255,255,0.6); }
    .quiz-info span { display: flex; align-items: center; gap: 5px; }
    .quiz-description { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.5;
      margin-bottom: 15px; }
    .quiz-footer { display: flex; justify-content: space-between; align-items: center; }
    .difficulty-badge { font-size: 11px; padding: 5px 12px; border-radius: 20px; font-weight: 600; }
    .difficulty-easy { background: rgba(0,255,136,0.2); color: #00ff88; }
    .difficulty-medium { background: rgba(243,156,18,0.2); color: #f39c12; }
    .difficulty-hard { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-start { background: linear-gradient(135deg, #7c3aed, #00d4ff); color: #fff;
      border: none; padding: 8px 20px; border-radius: 20px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .btn-start:hover { transform: scale(1.05); }
    
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); }
    .empty-state-icon { font-size: 48px; margin-bottom: 15px; }
    
    /* Stats */
    .stats-bar { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-value { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 700;
      color: #7c3aed; }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.6); }
    
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 15px; padding: 15px 20px; }
      nav { flex-wrap: wrap; justify-content: center; }
      nav a { margin: 5px 10px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <header>
    <div class="logo">SeekhoWith<span>Rua</span></div>
    <nav>
      <a href="../index.html">🏠 LMS Home</a>
      <a href="index.html" class="active">📝 Quizzes</a>
      <a href="../my-learning.html">📚 My Learning</a>
      <a href="https://app.seekhowithrua.com" target="_blank">💬 Live Rooms</a>
    </nav>
    <div class="user-section" id="userSection"></div>
  </header>
  
  <main>
    <h1>🎯 Test Your Knowledge</h1>
    <p class="subtitle">Quizzes for all courses - Practice and improve your skills</p>
    
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalQuizzes">0</div>
        <div class="stat-label">Total Quizzes</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="completedQuizzes">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="avgScore">0%</div>
        <div class="stat-label">Avg Score</div>
      </div>
    </div>
    
    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All Quizzes</button>
      <button class="filter-tab" data-filter="python">Python</button>
      <button class="filter-tab" data-filter="data-science">Data Science</button>
      <button class="filter-tab" data-filter="web-dev">Web Dev</button>
      <button class="filter-tab" data-filter="ai-ml">AI/ML</button>
      <button class="filter-tab" data-filter="cloud">Cloud</button>
      <button class="filter-tab" data-filter="devops">DevOps</button>
    </div>
    
    <!-- Quiz Grid -->
    <div class="quiz-grid" id="quizGrid"></div>
  </main>

  <script>
    // Quiz Data - Add new quizzes here
    const quizzes = [
      {
        id: 'python-basics',
        title: 'Python Basics Quiz',
        category: 'python',
        icon: '🐍',
        iconBg: 'linear-gradient(135deg, #3776ab, #ffd43b)',
        difficulty: 'easy',
        questions: 20,
        duration: '15 min',
        description: 'Test your Python fundamentals - variables, data types, control flow, and functions.',
        file: 'python-basics.html'
      },
      {
        id: 'web-dev-html-css',
        title: 'HTML & CSS Mastery',
        category: 'web-dev',
        icon: '💻',
        iconBg: 'linear-gradient(135deg, #e74c3c, #f39c12)',
        difficulty: 'easy',
        questions: 25,
        duration: '20 min',
        description: 'HTML5 semantic elements, CSS styling, flexbox, grid layout, and responsive design.',
        file: 'web-dev-html-css.html'
      },
      {
        id: 'python-oop',
        title: 'Python OOP Quiz',
        category: 'python',
        icon: '🐍',
        iconBg: 'linear-gradient(135deg, #3776ab, #4ecdc4)',
        difficulty: 'medium',
        questions: 25,
        duration: '20 min',
        description: 'Object-oriented programming in Python - classes, inheritance, polymorphism.',
        file: 'python-oop.html'
      },
      {
        id: 'data-science-basics',
        title: 'Data Science Fundamentals',
        category: 'data-science',
        icon: '📊',
        iconBg: 'linear-gradient(135deg, #7c3aed, #00d4ff)',
        difficulty: 'easy',
        questions: 20,
        duration: '15 min',
        description: 'Introduction to Data Science - statistics, data analysis, visualization basics.',
        file: 'data-science-basics.html'
      },
      {
        id: 'ml-algorithms',
        title: 'Machine Learning Algorithms',
        category: 'ai-ml',
        icon: '🤖',
        iconBg: 'linear-gradient(135deg, #ff6b6b, #7c3aed)',
        difficulty: 'hard',
        questions: 30,
        duration: '30 min',
        description: 'Supervised and unsupervised learning algorithms, model evaluation.',
        file: 'ml-algorithms.html'
      },
      {
        id: 'web-dev-html-css',
        title: 'HTML & CSS Mastery',
        category: 'web-dev',
        icon: '💻',
        iconBg: 'linear-gradient(135deg, #e74c3c, #f39c12)',
        difficulty: 'easy',
        questions: 25,
        duration: '20 min',
        description: 'HTML5 semantic elements, CSS styling, flexbox, grid layout.',
        file: 'web-dev-html-css.html'
      },
      {
        id: 'javascript-fundamentals',
        title: 'JavaScript Fundamentals',
        category: 'web-dev',
        icon: '💻',
        iconBg: 'linear-gradient(135deg, #f39c12, #ffd93b)',
        difficulty: 'medium',
        questions: 25,
        duration: '20 min',
        description: 'JavaScript ES6+ - variables, functions, async/await, DOM manipulation.',
        file: 'javascript-fundamentals.html'
      },
      {
        id: 'react-basics',
        title: 'React.js Basics',
        category: 'web-dev',
        icon: '⚛️',
        iconBg: 'linear-gradient(135deg, #61dafb, #282c34)',
        difficulty: 'medium',
        questions: 25,
        duration: '20 min',
        description: 'Components, props, state, hooks, and component lifecycle.',
        file: 'react-basics.html'
      },
      {
        id: 'django-backend',
        title: 'Django Backend Quiz',
        category: 'web-dev',
        icon: '🐍',
        iconBg: 'linear-gradient(135deg, #092e20, #44b78b)',
        difficulty: 'medium',
        questions: 30,
        duration: '25 min',
        description: 'Django models, views, templates, ORM, and REST APIs.',
        file: 'django-backend.html'
      },
      {
        id: 'aws-fundamentals',
        title: 'AWS Fundamentals',
        category: 'cloud',
        icon: '☁️',
        iconBg: 'linear-gradient(135deg, #ff9900, #232f3e)',
        difficulty: 'medium',
        questions: 25,
        duration: '20 min',
        description: 'AWS core services - EC2, S3, RDS, Lambda, IAM basics.',
        file: 'aws-fundamentals.html'
      },
      {
        id: 'docker-basics',
        title: 'Docker & Containers',
        category: 'devops',
        icon: '🐳',
        iconBg: 'linear-gradient(135deg, #2496ed, #0db7ed)',
        difficulty: 'medium',
        questions: 20,
        duration: '15 min',
        description: 'Docker containers, images, Dockerfile, docker-compose basics.',
        file: 'docker-basics.html'
      },
      {
        id: 'devops-cicd',
        title: 'CI/CD Pipelines',
        category: 'devops',
        icon: '⚙️',
        iconBg: 'linear-gradient(135deg, #e67e22, #d35400)',
        difficulty: 'hard',
        questions: 25,
        duration: '20 min',
        description: 'Continuous Integration, Continuous Deployment, Jenkins, GitHub Actions.',
        file: 'devops-cicd.html'
      },
      {
        id: 'deep-learning',
        title: 'Deep Learning Basics',
        category: 'ai-ml',
        icon: '🧠',
        iconBg: 'linear-gradient(135deg, #ff6b6b, #4ecdc4)',
        difficulty: 'hard',
        questions: 30,
        duration: '30 min',
        description: 'Neural networks, CNNs, RNNs, TensorFlow/Keras fundamentals.',
        file: 'deep-learning.html'
      }
    ];
    
    // Create particles
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 20 + 's';
        p.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(p);
      }
    }
    
    // Get quiz progress from localStorage
    function getQuizProgress() {
      const stored = localStorage.getItem('quizes_progress');
      return stored ? JSON.parse(stored) : {};
    }
    
    // Save quiz progress
    function saveQuizProgress(quizId, score, total) {
      const progress = getQuizProgress();
      progress[quizId] = {
        score,
        total,
        percentage: Math.round((score / total) * 100),
        completedAt: new Date().toISOString()
      };
      localStorage.setItem('quizes_progress', JSON.stringify(progress));
      updateStats();
    }
    
    // Update stats
    function updateStats() {
      const progress = getQuizProgress();
      const completed = Object.keys(progress).length;
      const total = quizzes.length;
      
      let totalScore = 0;
      Object.values(progress).forEach(p => totalScore += p.percentage);
      const avg = completed > 0 ? Math.round(totalScore / completed) : 0;
      
      document.getElementById('totalQuizzes').textContent = total;
      document.getElementById('completedQuizzes').textContent = completed;
      document.getElementById('avgScore').textContent = avg + '%';
    }
    
    // Render quiz card
    function renderQuizCard(quiz) {
      const progress = getQuizProgress();
      const completed = progress[quiz.id];
      const difficultyClass = `difficulty-${quiz.difficulty}`;
      
      return `
        <a href="${quiz.file}" class="quiz-card">
          <div class="quiz-header">
            <div class="quiz-icon" style="background: ${quiz.iconBg};">${quiz.icon}</div>
            <div class="quiz-meta">
              <div class="quiz-category">${quiz.category.replace('-', ' ').toUpperCase()}</div>
              <div class="quiz-title">${quiz.title}</div>
              <div class="quiz-info">
                <span>❓ ${quiz.questions} Qs</span>
                <span>⏱️ ${quiz.duration}</span>
              </div>
            </div>
          </div>
          <p class="quiz-description">${quiz.description}</p>
          <div class="quiz-footer">
            <span class="difficulty-badge ${difficultyClass}">${quiz.difficulty.toUpperCase()}</span>
            ${completed 
              ? `<span style="color: #00ff88; font-weight: 600;">✓ ${completed.percentage}%</span>`
              : '<span class="btn-start">Start Quiz →</span>'
            }
          </div>
        </a>
      `;
    }
    
    // Filter and render quizzes
    function renderQuizzes(filter = 'all') {
      const grid = document.getElementById('quizGrid');
      const filtered = filter === 'all' 
        ? quizzes 
        : quizzes.filter(q => q.category === filter);
      
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-state-icon">🔍</div>
            <p>No quizzes found for this category.</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = filtered.map(renderQuizCard).join('');
    }
    
    // Filter button handlers
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderQuizzes(tab.dataset.filter);
      });
    });
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      updateStats();
      renderQuizzes();
    });
  </script>
</body>
</html>
